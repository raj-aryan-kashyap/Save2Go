<script>
        const APP_VERSION = "v1.4.0";
        const API_URL = "https://script.google.com/macros/s/AKfycbyYTU_I0zel50EKpB767LmQ2NjeKudS93yv8-DYSYnBxaFS5_I1TWily79rOkMdGTu5IA/exec"; 
        
        let currentUser = localStorage.getItem('compass_user');
        let deviceId = localStorage.getItem('compass_device_id') || generateAndSaveDeviceId();
        let travelSpots = JSON.parse(localStorage.getItem('compass_cache')) || [];
        let checkedFilterStateArray = JSON.parse(localStorage.getItem('compass_active_filters')) || [];
        let checkedCitiesStateArray = JSON.parse(localStorage.getItem('compass_active_cities')) || [];
        let showStarredOnly = JSON.parse(localStorage.getItem('compass_starred_only')) || false;
        let hideCompletedSpotsStateBool = localStorage.getItem('compass_hide_completed') !== null ? JSON.parse(localStorage.getItem('compass_hide_completed')) : true;
        
        let userLat = 48.8566; let userLon = 2.3522;
        let areaContextStr = "Unknown Coordinates"; let cachedHardwareString = "Unknown Device Model";
        let gpsStatusCachedBool = false; let activeTabID = 'map';
        let liveGpsWatchId = null; // Tracks persistent hardware connection hook
        
        let leafletMapInstance = null; let mapMarkersLayerGroup = null; let userPositionPulseCircle = null;
        let startY = 0; let isPulling = false;
        const GESTURE_CONTAINER = document.getElementById('gesture-touch-container');
        const PULL_INDICATOR = document.getElementById('pullToRefreshIndicatorHUD');

        window.onload = function() {
            cachedHardwareString = parseReadableDeviceHardware();
            document.getElementById('meta-id').innerText = `Device ID: ${deviceId}`;
            document.getElementById('meta-hardware').innerText = `Model: ${cachedHardwareString}`;
            document.getElementById('meta-version').innerText = `Version: ${APP_VERSION}`;
            
            initLeafletMapEngineCanvas();
            populateUserDropdowns();
            syncPriorityFilterViewModeUI();
            
            if (travelSpots.length > 0) {
                calculateSmartCityDefaultFilters();
                renderList();
                plotDynamicMarkersOnCanvasMap();
            }
            
            if (!currentUser) {
                document.getElementById('userModal').classList.remove('hidden');
            } else {
                initializeSessionDashboard();
            }
            setupNetworkListeners(); // Instantly activates hyper-responsive connection tracking
            monitorNativeGpsPermissions();
            setupNativePullToRefreshGestures();
            
            document.addEventListener('click', (event) => {
                if (!event.target.closest('#cityHUDDropdownPopupBox') && 
                    !event.target.closest('#filterCategoryDropdownPopupBox') && 
                    !event.target.closest('#cityFilterHUDTriggerBtn') && 
                    !event.target.closest('#filterMenuTriggerBtn')) {
                    closeAllActiveHUDDropdownOverlays();
                }
            });
        };

        function initLeafletMapEngineCanvas() {
            if (leafletMapInstance) return;
            leafletMapInstance = L.map('map-render-element', { zoomControl: false, attributionControl: false }).setView([userLat, userLon], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(leafletMapInstance);
            mapMarkersLayerGroup = L.layerGroup().addTo(leafletMapInstance);
            
            leafletMapInstance.on('zoomend', () => {
                if (travelSpots.length > 0) plotDynamicMarkersOnCanvasMap();
            });
        }

        function parseReadableDeviceHardware() {
            const ua = navigator.userAgent;
            let os = "Unknown OS";
            if (/Android/i.test(ua)) os = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
            const width = window.screen.width; const height = window.screen.height;
            let modelEstimate = "";
            if (os === "Android") {
                if ((width === 360 && height === 800) || (width === 412 && height === 915)) modelEstimate = " (Likely Samsung S-Series)";
                else if (width === 412 && height === 892) modelEstimate = " (Likely Pixel)";
                else modelEstimate = " Mobile";
            } else if (os === "iOS") {
                if (width === 393 && height === 852) modelEstimate = " (iPhone Pro)";
                else if (width === 430 && height === 932) modelEstimate = " (iPhone Pro Max)";
                else modelEstimate = " Phone";
            }
            return `${os}${modelEstimate}`;
        }

        function generateAndSaveDeviceId() {
            const newId = "DEV-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            localStorage.setItem('compass_device_id', newId); return newId;
        }

        function monitorNativeGpsPermissions() {
            if (navigator.permissions && navigator.permissions.query) {
                navigator.permissions.query({ name: 'geolocation' }).then(status => {
                    const checkState = () => {
                        if (status.state === 'denied') { 
                            gpsStatusCachedBool = false; 
                            updateGpsHudStatus(false, "GPS Off"); 
                        }
                    };
                    status.onchange = checkState; checkState();
                });
            }
        }

        function setupNativePullToRefreshGestures() {
            if (!GESTURE_CONTAINER) return;
            GESTURE_CONTAINER.addEventListener('touchstart', (e) => {
                if (GESTURE_CONTAINER.scrollTop === 0) { startY = e.touches[0].pageY; isPulling = true; }
            }, { passive: true });

            GESTURE_CONTAINER.addEventListener('touchmove', (e) => {
                if (!isPulling) return;
                const currentY = e.touches[0].pageY; const diff = currentY - startY;
                if (diff > 0) { const heightBound = Math.min(diff * 0.4, 50); PULL_INDICATOR.style.height = `${heightBound}px`; }
            }, { passive: true });

            GESTURE_CONTAINER.addEventListener('touchend', () => {
                if (!isPulling) return; isPulling = false;
                const currentHeight = parseInt(PULL_INDICATOR.style.height || 0); PULL_INDICATOR.style.height = '0px';
                if (currentHeight >= 40) { syncData(true); }
            }, { passive: true });
        }

        async function populateUserDropdowns() {
            const loginDropdown = document.getElementById('loginDropdown');
            const settingsDropdown = document.getElementById('settingsSwitchUserDropdown');
            try {
                const response = await fetch(`${API_URL}?action=get_users`);
                const usersList = await response.json();
                if (Array.isArray(usersList) && usersList.length > 0) {
                    loginDropdown.innerHTML = ''; settingsDropdown.innerHTML = '';
                    usersList.forEach(user => {
                        const opt1 = document.createElement('option'); opt1.value = user; opt1.innerText = user; loginDropdown.appendChild(opt1);
                        const opt2 = document.createElement('option'); opt2.value = user; opt2.innerText = user; settingsDropdown.appendChild(opt2);
                    });
                }
            } catch(e) {}
        }

        // IMPROVED: Initializes persistent tracking for background hardware updates
        function initializeSessionDashboard() {
            syncData(true);
            startLiveHardwareGPSTracking();
            updateNetworkStatusHUD(); // Run immediate network diagnostic pass on startup
        }

        // NEW: Real-time background location subscriber loop
        function startLiveHardwareGPSTracking() {
            if (!navigator.geolocation) {
                gpsStatusCachedBool = false;
                updateGpsHudStatus(false, "Unsupported");
                return;
            }
            if (liveGpsWatchId !== null) navigator.geolocation.clearWatch(liveGpsWatchId);

            liveGpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    gpsStatusCachedBool = true;
                    updateGpsHudStatus(true, "GPS Active");
                    
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    
                    // Smoothly repositions the blue location pulse dot on map shifts
                    if (leafletMapInstance) {
                        if (userPositionPulseCircle) {
                            userPositionPulseCircle.setLatLng([userLat, userLon]);
                        } else {
                            userPositionPulseCircle = L.circleMarker([userLat, userLon], { 
                                radius: 8, fillColor: '#3b82f6', fillOpacity: 0.8, color: '#ffffff', weight: 2 
                            }).addTo(leafletMapInstance);
                        }
                    }
                    
                    // Live recalculation of distance metrics across loaded views
                    renderList();
                },
                (err) => {
                    gpsStatusCachedBool = false;
                    if (err.code === err.PERMISSION_DENIED) {
                        updateGpsHudStatus(false, "⚠️ GPS Denied");
                    } else {
                        updateGpsHudStatus(false, "⚠️ GPS Error");
                    }
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function switchMasterMenuDashboardTab(targetTabID) {
            if(targetTabID === activeTabID) return;
            document.getElementById(`nav-tab-${activeTabID}`).className = "flex flex-col items-center gap-1 text-slate-500";
            document.getElementById(`view-${activeTabID}`).classList.remove('active-view');
            document.getElementById(`nav-tab-${targetTabID}`).className = "flex flex-col items-center gap-1 text-pink-500";
            document.getElementById(`view-${targetTabID}`).classList.add('active-view');
            activeTabID = targetTabID;
            if(targetTabID === 'map' && leafletMapInstance) { 
                setTimeout(() => { 
                    leafletMapInstance.invalidateSize(); 
                    if(gpsStatusCachedBool) leafletMapInstance.setView([userLat, userLon], leafletMapInstance.getZoom());
                }, 50); 
            }
        }

        function toggleCityDropdownOverlayMenu(event) {
            event.stopPropagation();
            const box = document.getElementById('cityHUDDropdownPopupBox');
            const backdrop = document.getElementById('dropdownBlurBackdrop');
            document.getElementById('filterCategoryDropdownPopupBox').classList.add('hidden');
            if (!box.classList.contains('hidden')) { box.classList.add('hidden'); backdrop.classList.add('hidden'); } 
            else { box.classList.remove('hidden'); backdrop.classList.remove('hidden'); calculateSmartCityDefaultFilters(); }
        }

        function toggleFilterDropdownOverlayMenu(event) {
            event.stopPropagation();
            const box = document.getElementById('filterCategoryDropdownPopupBox');
            const backdrop = document.getElementById('dropdownBlurBackdrop');
            document.getElementById('cityHUDDropdownPopupBox').classList.add('hidden');
            if (!box.classList.contains('hidden')) { box.classList.add('hidden'); backdrop.classList.add('hidden'); } 
            else { box.classList.remove('hidden'); backdrop.classList.remove('hidden'); buildDynamicShoppingCheckboxList(); }
        }

        function closeAllActiveHUDDropdownOverlays() {
            document.getElementById('cityHUDDropdownPopupBox').classList.add('hidden');
            document.getElementById('filterCategoryDropdownPopupBox').classList.add('hidden');
            document.getElementById('dropdownBlurBackdrop').classList.add('hidden');
        }

        async function handleInitialLoginSubmit() {
            const dropdownVal = document.getElementById('loginDropdown').value;
            const textVal = document.getElementById('customUsernameInput').value.trim();
            const chosenName = (textVal !== "") ? textVal : dropdownVal;
            if(!chosenName || chosenName === "") return;
            localStorage.setItem('compass_user', chosenName); currentUser = chosenName;
            document.getElementById('userModal').classList.add('hidden');
            initializeSessionDashboard();
        }

        function updateGpsHudStatus(isActive, message) {
            const btn = document.getElementById('gpsBadgeButton');
            const dot = document.getElementById('gpsDotSignal');
            const text = document.getElementById('gpsBadgeText');
            if(!btn || !dot || !text) return;
            
            if (isActive) {
                btn.className = "px-2.5 py-1 rounded-lg text-[9px] font-black uppercase border flex items-center gap-1 bg-emerald-500/5 border-emerald-500/20 text-emerald-400";
                dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"; 
                text.innerText = message || "GPS Active";
            } else {
                btn.className = "px-2.5 py-1 rounded-lg text-[9px] font-black uppercase border flex items-center gap-1 bg-amber-500/5 border-amber-500/20 text-amber-400";
                dot.className = "w-1.5 h-1.5 rounded-full bg-amber-500"; 
                text.innerText = message || "⚠️ GPS Off";
            }
        }

        function triggerRecenterToGpsHardwareAction() {
            if (!leafletMapInstance) return;
            if (gpsStatusCachedBool) {
                leafletMapInstance.setView([userLat, userLon], 15, { animate: true });
            } else {
                updateGpsHudStatus(false, "Pinging...");
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude; userLon = pos.coords.longitude;
                    gpsStatusCachedBool = true;
                    updateGpsHudStatus(true, "GPS Active");
                    startLiveHardwareGPSTracking();
                    leafletMapInstance.setView([userLat, userLon], 15, { animate: true });
                }, () => { alert("Please grant device location access permissions."); }, { enableHighAccuracy: true, timeout: 4000 });
            }
        }

        function snapMapViewportToSelectedCityBounds() {
            if (!leafletMapInstance || travelSpots.length === 0 || checkedCitiesStateArray.length === 0) return;
            const matchTarget = travelSpots.find(spot => spot.latitude && spot.longitude && checkedCitiesStateArray.includes(spot.city));
            if (matchTarget) { leafletMapInstance.setView([parseFloat(matchTarget.latitude), parseFloat(matchTarget.longitude)], 13, { animate: true }); }
        }

        function forceReRequestGPSHardware() {
            startLiveHardwareGPSTracking();
        }

        function toggleSettingsMenu(show) { document.getElementById('settingsDrawer').classList.toggle('hidden', !show); }

        // NEW: Real-time network intercept system triggers instantaneous structural state changes
        function setupNetworkListeners() {
            window.addEventListener('online', updateNetworkStatusHUD);
            window.addEventListener('offline', updateNetworkStatusHUD);
        }

        // NEW: Handles immediate network connection updates
        function updateNetworkStatusHUD() {
            const indicator = document.getElementById('networkIndicator');
            const syncText = document.getElementById('syncText');
            if(!indicator || !syncText) return;

            if (navigator.onLine) {
                indicator.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                syncText.className = "text-[9px] font-mono text-slate-500";
                syncText.innerText = "Synced Live Data";
            } else {
                indicator.className = "w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse";
                syncText.className = "text-[9px] font-mono text-red-400 font-bold";
                syncText.innerText = "OFFLINE MODE";
            }
        }

        function setPriorityFilterState(shouldShowStarredOnly) {
            showStarredOnly = shouldShowStarredOnly;
            localStorage.setItem('compass_starred_only', JSON.stringify(showStarredOnly));
            syncPriorityFilterViewModeUI(); renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function syncPriorityFilterViewModeUI() {
            const showAllBtn = document.getElementById('toggleOptionShowAll');
            const starredBtn = document.getElementById('toggleOptionStarred');
            if (showStarredOnly) {
                showAllBtn.className = "flex-1 text-center text-[10px] font-black tracking-wide rounded-lg text-slate-500 bg-transparent";
                starredBtn.className = "flex-1 text-center text-[10px] font-black tracking-wide rounded-lg text-amber-400 bg-amber-500/10";
            } else {
                showAllBtn.className = "flex-1 text-center text-[10px] font-black tracking-wide rounded-lg text-amber-400 bg-amber-500/10";
                starredBtn.className = "flex-1 text-center text-[10px] font-black tracking-wide rounded-lg text-slate-500 bg-transparent";
            }
        }

        function buildDynamicShoppingCheckboxList() {
            const scrollContainer = document.getElementById('checkboxScrollRegionContainer');
            const stickyPanel = document.getElementById('hideCompletedTargetRowContainer');
            if(!scrollContainer || !stickyPanel) return;
            scrollContainer.innerHTML = ''; stickyPanel.innerHTML = '';
            
            let uniqueCategories = new Set();
            travelSpots.forEach(spot => { if (spot.category) spot.category.split(',').forEach(c => uniqueCategories.add(c.trim())); });
            
            uniqueCategories.forEach(cat => {
                if(!cat) return;
                const label = document.createElement('label');
                label.className = "flex items-center justify-between p-2 rounded-lg hover:bg-slate-800 cursor-pointer";
                label.innerHTML = `<span class="truncate pr-2">${cat}</span><input type="checkbox" value="${cat}" ${checkedFilterStateArray.includes(cat) ? 'checked' : ''} onchange="handleCheckboxToggleEvent(this)" class="w-3.5 h-3.5 accent-pink-500 rounded bg-slate-950">`;
                scrollContainer.appendChild(label);
            });

            const hideCompletedLabel = document.createElement('label');
            hideCompletedLabel.className = "flex items-center justify-between p-2 rounded-lg bg-pink-500/5 hover:bg-pink-500/10 text-pink-400 cursor-pointer text-xs font-bold w-full";
            hideCompletedLabel.innerHTML = `<span class="truncate pr-2 font-black">Hide Completed</span><input type="checkbox" id="hideCompletedFilterSystemCheckbox" ${hideCompletedSpotsStateBool ? 'checked' : ''} onchange="handleHideCompletedStateToggleCheckboxEvent(this)" class="w-3.5 h-3.5 accent-pink-500 rounded bg-slate-950">`;
            stickyPanel.appendChild(hideCompletedLabel);
            updateHeaderBadgeHUDCounters();
        }

        function handleCheckboxToggleEvent(checkboxElement) {
            const val = checkboxElement.value;
            if (checkboxElement.checked) { if(!checkedFilterStateArray.includes(val)) checkedFilterStateArray.push(val); } 
            else { checkedFilterStateArray = checkedFilterStateArray.filter(i => i !== val); }
            localStorage.setItem('compass_active_filters', JSON.stringify(checkedFilterStateArray));
            updateHeaderBadgeHUDCounters(); renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function handleHideCompletedStateToggleCheckboxEvent(checkboxElement) {
            hideCompletedSpotsStateBool = checkboxElement.checked;
            localStorage.setItem('compass_hide_completed', JSON.stringify(hideCompletedSpotsStateBool));
            renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function clearAllFilterCheckboxes() {
            checkedFilterStateArray = []; 
            localStorage.setItem('compass_active_filters', JSON.stringify([]));
            const checkboxes = document.getElementById('checkboxScrollRegionContainer').querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);
            updateHeaderBadgeHUDCounters(); renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function updateHeaderBadgeHUDCounters() {
            const badge = document.getElementById('activeFilterBadgeCount');
            const btn = document.getElementById('filterMenuTriggerBtn');
            const count = checkedFilterStateArray.length;
            if(count > 0) {
                badge.innerText = count; badge.classList.remove('hidden');
                btn.className = "w-full bg-pink-500/10 border border-pink-500/30 rounded-xl h-[38px] text-center text-[11px] font-black text-pink-400 flex items-center justify-center gap-1 shadow-inner";
            } else {
                badge.classList.add('hidden');
                btn.className = "w-full bg-slate-950 border border-slate-800/80 rounded-xl h-[38px] text-center text-[11px] font-black text-slate-300 flex items-center justify-center gap-1 shadow-inner";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getFilteredDatasetRows() {
            let processed = travelSpots.map(spot => {
                const hasLatLon = spot.latitude && String(spot.latitude).trim() !== "" && spot.longitude && String(spot.longitude).trim() !== "";
                let distanceOutputLabel = !hasLatLon ? "⚠️ Missing Coordinates" : (!gpsStatusCachedBool ? "🛰️ GPS Off" : "");
                let rawDistanceValue = 99999;
                if (hasLatLon && gpsStatusCachedBool) {
                    const dist = calculateDistance(userLat, userLon, parseFloat(spot.latitude), parseFloat(spot.longitude));
                    rawDistanceValue = dist; distanceOutputLabel = dist < 1 ? `${Math.round(dist * 1000)}m` : `${dist.toFixed(1)}km`;
                }
                return { ...spot, distRaw: rawDistanceValue, distStr: distanceOutputLabel };
            });

            processed.sort((a, b) => a.distRaw - b.distRaw);
            if (hideCompletedSpotsStateBool) processed = processed.filter(s => (s.status || "").toLowerCase().trim() !== "done");
            if (showStarredOnly) processed = processed.filter(s => ['high','🔥','must do','starred'].includes((s.priority || "").toLowerCase()));
            if (checkedCitiesStateArray.length > 0) processed = processed.filter(s => checkedCitiesStateArray.includes(s.city));
            if (checkedFilterStateArray.length > 0) {
                processed = processed.filter(spot => {
                    if(!spot.category) return false;
                    const spotCats = spot.category.split(',').map(item => item.trim().toLowerCase());
                    return checkedFilterStateArray.some(checkedCat => spotCats.includes(checkedCat.toLowerCase()));
                });
            }
            return processed;
        }

        function plotDynamicMarkersOnCanvasMap() {
            if(!mapMarkersLayerGroup || !leafletMapInstance) return;
            mapMarkersLayerGroup.clearLayers();

            const dataset = getFilteredDatasetRows();
            const currentZoom = leafletMapInstance.getZoom();
            const CLUSTER_ZOOM_THRESHOLD = 12;

            if (currentZoom < CLUSTER_ZOOM_THRESHOLD) {
                let gridClusters = {};
                dataset.forEach(spot => {
                    if(!spot.latitude || !spot.longitude) return;
                    let key = parseFloat(spot.latitude).toFixed(2) + "_" + parseFloat(spot.longitude).toFixed(2);
                    if(!gridClusters[key]) gridClusters[key] = [];
                    gridClusters[key].push(spot);
                });

                for (let key in gridClusters) {
                    let spotsInCluster = gridClusters[key];
                    let clusterSize = spotsInCluster.length;
                    let targetLeadSpot = spotsInCluster[0];

                    if (clusterSize === 1) {
                        renderSingleMarkerElement(targetLeadSpot, 0, 0);
                    } else {
                        const clusterHTML = `<div class="cluster-map-cube">${clusterSize}</div>`;
                        const clusterIcon = L.divIcon({ html: clusterHTML, className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
                        const clusterMarker = L.marker([parseFloat(targetLeadSpot.latitude), parseFloat(targetLeadSpot.longitude)], { icon: clusterIcon });
                        
                        clusterMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            leafletMapInstance.setView([parseFloat(targetLeadSpot.latitude), parseFloat(targetLeadSpot.longitude)], CLUSTER_ZOOM_THRESHOLD + 1, { animate: true });
                        });
                        mapMarkersLayerGroup.addLayer(clusterMarker);
                    }
                }
            } else {
                let coordinationPresenceRegistry = {};
                dataset.forEach((spot) => {
                    if(!spot.latitude || !spot.longitude) return;
                    let coordKey = parseFloat(spot.latitude).toFixed(5) + "_" + parseFloat(spot.longitude).toFixed(5);
                    
                    let latOffset = 0;
                    let lonOffset = 0;
                    if (coordinationPresenceRegistry[coordKey] !== undefined) {
                        coordinationPresenceRegistry[coordKey]++;
                        let count = coordinationPresenceRegistry[coordKey];
                        let angle = count * 0.7;
                        let radius = 0.00015 * count; 
                        latOffset = Math.sin(angle) * radius;
                        lonOffset = Math.cos(angle) * radius;
                    } else {
                        coordinationPresenceRegistry[coordKey] = 0;
                    }
                    renderSingleMarkerElement(spot, latOffset, lonOffset);
                });
            }
        }

        function renderSingleMarkerElement(spot, latOffset, lonOffset) {
            const isStarred = ['high','🔥','must do','starred'].includes((spot.priority || "").toLowerCase());
            const isDone = (spot.status || "").toLowerCase().trim() === 'done';

            let categoryIconEmoji = "📍";
            const catStr = (spot.category || "").toLowerCase();
            if(catStr.includes("food") || catStr.includes("cafe")) categoryIconEmoji = "🍕";
            else if(catStr.includes("photo") || catStr.includes("view")) categoryIconEmoji = "📸";
            else if(catStr.includes("shop")) categoryIconEmoji = "🛍️";
            else if(catStr.includes("bar") || catStr.includes("drink")) categoryIconEmoji = "🍸";

            const iconHTML = `<div class="custom-map-cube ${isStarred ? 'starred-cube-border' : ''} ${isDone ? 'opacity-40 filter grayscale' : ''}">${categoryIconEmoji}</div>`;
            const customMarkerIcon = L.divIcon({ html: iconHTML, className: '', iconSize: [36, 36], iconAnchor: [18, 18] });
            
            const finalLat = parseFloat(spot.latitude) + latOffset;
            const finalLon = parseFloat(spot.longitude) + lonOffset;
            const leafMarker = L.marker([finalLat, finalLon], { icon: customMarkerIcon });

            leafMarker.on('click', (event) => {
                L.DomEvent.stopPropagation(event);
                revealMapItemDetailTrayHUD(spot, isStarred);
            });
            mapMarkersLayerGroup.addLayer(leafMarker);
        }

        function revealMapItemDetailTrayHUD(spotObj, isStarredBool) {
            const tray = document.getElementById('mapDetailTrayHUD');
            const plusBtn = document.getElementById('globalFloatingActionPlusButton');
            const isDone = (spotObj.status || "").toLowerCase().trim() === 'done';
            const ticketLink = spotObj.ticket_url || "";
            
            if (plusBtn) plusBtn.classList.add('hidden');

            const titleWidget = document.getElementById('traySpotTitle');
            const notesWidget = document.getElementById('traySpotNotes');
            
            titleWidget.innerText = spotObj.spot_name || "Unnamed Destination";
            notesWidget.innerText = spotObj.notes || "No custom notes assigned.";
            document.getElementById('trayCityBadge').innerText = `${spotObj.city || 'Global'} • ${spotObj.category || 'General'}`;

            if (isDone) {
                titleWidget.className = "text-base font-bold text-slate-500 line-through mt-1.5 truncate max-w-[190px]";
                notesWidget.className = "text-xs text-slate-500 bg-slate-950/20 p-2.5 rounded-xl border border-slate-900/30 line-through leading-relaxed max-h-16 overflow-y-auto no-scrollbar";
            } else {
                titleWidget.className = "text-base font-bold text-slate-200 mt-1.5 truncate max-w-[190px]";
                notesWidget.className = "text-xs text-slate-400 bg-slate-950/40 p-2.5 rounded-xl border border-slate-800 leading-relaxed max-h-16 overflow-y-auto no-scrollbar";
            }
            
            document.getElementById('trayDistanceBadge').innerText = spotObj.distStr;
            document.getElementById('trayOpenReelBtn').href = spotObj.instagram_url || "#";
            document.getElementById('trayActionBtn').href = spotObj.latitude ? `http://googleusercontent.com/maps.google.com/?q=${spotObj.latitude},${spotObj.longitude}` : "#";

            const ticketRow = document.getElementById('trayTicketRow');
            const ticketBtn = document.getElementById('trayTicketBtn');
            if (ticketLink.trim() !== "") {
                ticketRow.classList.remove('hidden');
                ticketBtn.href = ticketLink;
            } else {
                ticketRow.classList.add('hidden');
            }

            const starredBadge = document.getElementById('trayStarredBadge');
            if (isStarredBool) starredBadge.classList.remove('hidden'); else starredBadge.classList.add('hidden');

            const doneBtn = document.getElementById('trayDoneToggleBtn');
            const starBtn = document.getElementById('trayStarToggleBtn');

            doneBtn.innerText = isDone ? '↩ Undo' : '✓ Done';
            doneBtn.onclick = function() {
                updateCloudAction(spotObj.rowid, 'update_status', isDone ? 'Pending' : 'Done', spotObj.spot_name);
                dismissMapDetailTrayHUDCard();
            };

            starBtn.innerText = isStarredBool ? 'Unstar' : '★ Star';
            starBtn.onclick = function() {
                updateCloudAction(spotObj.rowid, 'toggle_priority', isStarredBool ? 'Normal' : 'Starred', spotObj.spot_name);
                dismissMapDetailTrayHUDCard();
            };

            tray.classList.remove('hidden');
        }

        function dismissMapDetailTrayHUDCard() {
            document.getElementById('mapDetailTrayHUD').classList.add('hidden');
            const plusBtn = document.getElementById('globalFloatingActionPlusButton');
            if (plusBtn) plusBtn.classList.remove('hidden');
        }

        function renderList() {
            const container = document.getElementById('spots-list');
            if(!container) return; 
            container.innerHTML = '';
            
            const processed = getFilteredDatasetRows();
            if(processed.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-600 py-12 text-xs">No entries loaded matching these selection profiles.</div>`; 
                return;
            }

            processed.forEach(spot => {
                const isDone = (spot.status || "").toLowerCase().trim() === 'done';
                const isHigh = ['high','🔥','must do','starred'].includes((spot.priority || "").toLowerCase());
                const ticketLink = spot.ticket_url || "";
                
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border bg-slate-900 border-slate-800 ${isDone ? 'opacity-40' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <div class="max-w-[70%]">
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded bg-slate-950 text-slate-400 font-bold border border-slate-800">${spot.city} • ${spot.category}</span>
                            <h3 class="text-base font-bold ${isDone ? 'text-slate-500 line-through' : 'text-slate-200'} mt-1.5 truncate">${spot.spot_name}</h3>
                        </div>
                        <span class="text-xs font-mono font-bold bg-pink-500/10 text-pink-400 px-2 py-1 rounded-lg shrink-0 h-fit">${spot.distStr}</span>
                    </div>
                    <p class="text-xs ${isDone ? 'text-slate-500 line-through' : 'text-slate-400'} mt-2 bg-slate-950/40 p-2.5 rounded-xl border border-slate-900/60 leading-relaxed max-h-20 overflow-y-auto no-scrollbar">${spot.notes || 'No custom notes.'}</p>
                    
                    <div class="flex flex-col gap-2 mt-4">
                        <div class="flex gap-2">
                            <a href="${spot.instagram_url || '#'}" target="_blank" class="flex-1 bg-gradient-to-r from-pink-600 to-purple-600 text-center text-xs font-bold py-3 rounded-xl text-white block">Open Reel</a>
                            ${spot.latitude ? `<a href="http://googleusercontent.com/maps.google.com/?q=${spot.latitude},${spot.longitude}" target="_blank" class="px-4 bg-slate-950 border border-slate-800 text-slate-300 flex items-center justify-center rounded-xl text-xs font-bold whitespace-nowrap">🗺️ Get Direction</a>` : ''}
                        </div>
                        ${ticketLink.trim() !== "" ? `
                            <a href="${ticketLink}" target="_blank" class="w-full mt-1 bg-emerald-600 text-center text-xs font-bold py-2.5 rounded-xl text-white block">📄 View Ticket Details</a>
                        ` : ''}
                        <div class="flex gap-2 mt-1 justify-end">
                            <button onclick="updateCloudAction(${spot.rowid}, 'update_status', '${isDone ? 'Pending' : 'Done'}', '${spot.spot_name}')" class="text-xs px-3 py-1.5 rounded-lg bg-slate-950 border border-slate-800 text-slate-400">${isDone ? '↩ Undo' : '✓ Done'}</button>
                            <button onclick="updateCloudAction(${spot.rowid}, 'toggle_priority', '${isHigh ? 'Normal' : 'Starred'}', '${spot.spot_name}')" class="text-xs px-2 py-1.5 rounded-lg bg-slate-950 border border-slate-800 text-amber-400">${isHigh ? 'Unstar' : '★ Star'}</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateCloudAction(rowId, action, value, spotName) {
            const target = travelSpots.find(s => s.rowid === rowId);
            if (target) {
                if (action === 'update_status') target.status = value;
                if (action === 'toggle_priority') target.priority = value;
                renderList(); plotDynamicMarkersOnCanvasMap();
            }
            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rowId, action, value, user: currentUser, spot: spotName, deviceMeta: cachedHardwareString })
                });
                setTimeout(() => syncData(false), 800);
            } catch(err) {}
        }

        function calculateSmartCityDefaultFilters() {
            const container = document.getElementById('cityHUDChecklistContainer');
            if (!container) return; 
            container.innerHTML = '';
            
            let citySet = new Set();
            travelSpots.forEach(spot => {
                if (spot.city && String(spot.city).trim() !== "") {
                    citySet.add(spot.city.trim());
                }
            });

            if (citySet.size === 0) {
                container.innerHTML = `<div class="text-slate-500 text-[11px] p-2">No cities recorded</div>`;
                return;
            }

            citySet.forEach(city => {
                const label = document.createElement('label');
                label.className = "flex items-center justify-between p-2 rounded-lg hover:bg-slate-800 cursor-pointer";
                const isChecked = checkedCitiesStateArray.includes(city);
                label.innerHTML = `
                    <span class="truncate pr-2">${city}</span>
                    <input type="checkbox" value="${city}" ${isChecked ? 'checked' : ''} onchange="handleCityHUDCheckboxEventToggle(this)" class="w-3.5 h-3.5 accent-pink-500 rounded bg-slate-950">
                `;
                container.appendChild(label);
            });
            updateCityHUDTriggerButtonLabelText();
        }

        function handleCityHUDCheckboxEventToggle(checkboxElement) {
            const val = checkboxElement.value;
            if (checkboxElement.checked) { if(!checkedCitiesStateArray.includes(val)) checkedCitiesStateArray.push(val); } 
            else { checkedCitiesStateArray = checkedCitiesStateArray.filter(c => c !== val); }
            localStorage.setItem('compass_active_cities', JSON.stringify(checkedCitiesStateArray));
            updateCityHUDTriggerButtonLabelText(); renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function clearAllSelectedCityCheckboxes() {
            checkedCitiesStateArray = []; 
            localStorage.setItem('compass_active_cities', JSON.stringify([]));
            const checkboxes = document.getElementById('cityHUDChecklistContainer').querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);
            updateCityHUDTriggerButtonLabelText(); renderList(); plotDynamicMarkersOnCanvasMap();
        }

        function updateCityHUDTriggerButtonLabelText() {
            const textNode = document.getElementById('cityHUDTriggerText');
            const btn = document.getElementById('cityFilterHUDTriggerBtn');
            const count = checkedCitiesStateArray.length;
            if (count === 0) {
                textNode.innerText = "All Cities";
                btn.className = "w-full bg-slate-950 border border-slate-800/80 rounded-xl h-[38px] px-2 text-center text-[11px] font-black text-slate-300 flex items-center justify-center gap-1 truncate shadow-inner";
            } else {
                textNode.innerText = count === 1 ? checkedCitiesStateArray[0] : `Cities (${count})`;
                btn.className = "w-full bg-pink-500/10 border border-pink-500/30 rounded-xl h-[38px] px-2 text-center text-[11px] font-black text-pink-400 flex items-center justify-center gap-1 truncate shadow-inner";
            }
        }

        function toggleQuickAddModal(show) { document.getElementById('quickAddModal').classList.toggle('hidden', !show); }
        
        let formPriorityState = "Normal";
        function toggleFormPriorityState() {
            const btn = document.getElementById('form-priority-btn');
            if(formPriorityState === "Normal") {
                formPriorityState = "Starred"; btn.innerText = "★ Starred";
                btn.className = "px-4 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500 text-amber-400 font-extrabold";
            } else {
                formPriorityState = "Normal"; btn.innerText = "Normal";
                btn.className = "px-4 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 font-bold";
            }
        }

        async function submitNewSpotToCloud() {
            const url = document.getElementById('new-url').value;
            const city = document.getElementById('new-city').value;
            const cat = document.getElementById('new-category').value;
            const keyword = document.getElementById('new-keyword').value;
            const notes = document.getElementById('new-notes').value;
            const submitBtn = document.getElementById('form-submit-btn');

            if(!keyword || !url) { alert("Provide a keyword title and source link."); return; }
            submitBtn.innerText = "Injecting into Sheet Database..."; submitBtn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'append_new_spot', user: currentUser, city: city || 'Global', spot_name: keyword, category: cat, instagram_url: url, notes: notes, priority: formPriorityState, deviceMeta: cachedHardwareString })
                });
                document.getElementById('new-url').value = ''; document.getElementById('new-keyword').value = ''; document.getElementById('new-notes').value = '';
                toggleQuickAddModal(false); setTimeout(() => syncData(true), 1000);
            } catch(err) { alert("Submission timed out."); } 
            finally { submitBtn.innerText = "💾 Sync to Shared Google Sheet"; submitBtn.disabled = false; }
        }

        async function syncData(isManualForce) {
            const syncText = document.getElementById('syncText');
            if (syncText && isManualForce) syncText.innerText = "Checking cloud...";
            try {
                const response = await fetch(API_URL);
                const cloudData = await response.json();
                if(Array.isArray(cloudData)) {
                    travelSpots = cloudData;
                    localStorage.setItem('compass_cache', JSON.stringify(travelSpots));
                    calculateSmartCityDefaultFilters(); renderList(); plotDynamicMarkersOnCanvasMap();
                    updateNetworkStatusHUD();
                }
            } catch (e) { if(syncText) syncText.innerText = "Offline Mode"; }
        }
        
        async function triggerSecureServerHistoryPurgeVault() {}
        function clearDeviceSessionAndLogout() {}
        function commitProfileRename() {}
        function switchUserSessionViaSettings() {}
    </script>
